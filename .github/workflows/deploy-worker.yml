name: Deploy Worker

on:
  push:
    branches: [main]
    # Only redeploy when the worker itself changes.
    paths:
      - "worker/**"
  # Allow manual runs, e.g. the first deploy after adding the token.
  workflow_dispatch:

# One worker deployment at a time.
concurrency:
  group: deploy-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: worker/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # `pnpm run deploy`, not `pnpm deploy` (the latter is a built-in pnpm
      # command and would not run the package.json script).
      - run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
